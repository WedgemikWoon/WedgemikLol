<!DOCTYPE html>
<html>
<head>
  <title>My IP Checker</title>
</head>
<body>
  <h1>Your Public IP Address</h1>
  <p id="ip">Loading...</p>

  <script>
    fetch("https://api.ipify.org?format=json")
      .then(response => response.json())
      .then(data => {
        document.getElementById("ip").textContent = data.ip;
      })
      .catch(() => {
        document.getElementById("ip").textContent = "Could not get IP";
      });
  </script>
</body>
</html>
