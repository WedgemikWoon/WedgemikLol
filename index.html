<!DOCTYPE html>
<html>
<body>

<h2>IP Collection Test</h2>

<p>
Click Allow to consent to sending your IP address for this test.
</p>

<button onclick="allow()">Allow</button>
<button onclick="deny()">Deny</button>

<p id="msg"></p>

<script>
async function allow() {
    await fetch("/collect-ip", {
        method: "POST"
    });

    document.getElementById("msg").innerText =
        "Consent recorded.";
}

function deny() {
    document.getElementById("msg").innerText =
        "Nothing collected.";
}
</script>

</body>
</html>
