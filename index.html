<!DOCTYPE html>
<html>
<head>
  <title>IP Consent Test</title>
</head>
<body>

<h2>Privacy Notice</h2>
<p>
  By clicking "Allow", you agree that your IP address may be collected
  for this test.
</p>

<button id="allow">Allow</button>
<button id="deny">Deny</button>

<p id="result"></p>

<script>
document.getElementById("allow").onclick = async () => {
  await fetch("/collect-ip", {
    method: "POST"
  });

  document.getElementById("result").innerText =
    "Consent given. IP recorded.";
};

document.getElementById("deny").onclick = () => {
  document.getElementById("result").innerText =
    "No information collected.";
};
</script>

</body>
</html>
